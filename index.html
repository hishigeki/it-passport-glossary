<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITパスポート 漢字用語辞典 | DX学科</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF7F9;
    --bg-2:#FCEEF3;
    --panel:#FFFFFF;
    --panel-2:#FDEFF3;
    --line:#F0D3DE;
    --ink:#2B1720;
    --muted:#93677A;
    --paper:#FFFCF6;
    --paper-ink:#2B1720;
    --paper-line:#EFC3D3;
    --teal:#C2185B;
    --teal-dim:rgba(194,24,91,0.10);
    --amber:#9C5B00;
    --amber-dim:rgba(156,91,0,0.14);
    --radius:14px;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --serif:'Noto Serif JP',serif;
    --sans:'Noto Sans JP',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 12% -10%, rgba(194,24,91,0.07), transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(183,121,31,0.06), transparent 40%),
      var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}

  /* ---------- Header ---------- */
  header{
    padding:34px 20px 22px;
    max-width:980px;
    margin:0 auto;
    position:relative;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.18em;
    color:var(--teal);
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow::before{
    content:"";
    width:22px;height:1px;background:var(--teal);
    display:inline-block;
  }
  h1{
    font-family:var(--serif);
    font-weight:900;
    font-size:clamp(28px,5.4vw,44px);
    line-height:1.25;
    margin:10px 0 8px;
    letter-spacing:.01em;
  }
  h1 .kanji-accent{
    background:linear-gradient(120deg,var(--teal),var(--amber));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .lede{
    color:var(--muted);
    font-size:14px;
    line-height:1.9;
    max-width:60ch;
  }
  .stat-strip{
    display:flex;
    gap:18px;
    margin-top:18px;
    flex-wrap:wrap;
  }
  .stat{
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted);
    border:1px solid var(--line);
    border-radius:999px;
    padding:6px 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .stat b{color:var(--ink);font-size:14px;}
  .stat .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);}

  /* ---------- Mode tabs ---------- */
  .shell{max-width:980px;margin:0 auto;padding:0 20px 70px;}
  .tabs{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:26px 0 22px;
  }
  .tab{
    font-family:var(--sans);
    font-weight:700;
    font-size:15px;
    padding:16px 18px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    cursor:pointer;
    color:var(--muted);
    text-align:left;
    transition:border-color .15s, color .15s, background .15s;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .tab span.sub{font-family:var(--mono);font-weight:400;font-size:11px;color:var(--muted);letter-spacing:.04em;}
  .tab.active{
    color:var(--ink);
    border-color:var(--teal);
    background:linear-gradient(180deg, var(--teal-dim), transparent 60%), var(--panel);
  }
  .tab.active span.sub{color:var(--teal);}
  .tab:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}

  /* ---------- Breadcrumb / back ---------- */
  .crumbbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
    min-height:34px;
  }
  .crumbs{
    font-family:var(--mono);
    font-size:13px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .crumbs .seg{
    cursor:pointer;
    color:var(--teal);
    padding:2px 4px;
  }
  .crumbs .seg:hover{text-decoration:underline;}
  .crumbs .sep{color:var(--line);}
  .backbtn{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink);
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 12px;
    cursor:pointer;
    white-space:nowrap;
  }
  .backbtn:hover{border-color:var(--teal);}

  /* ---------- Bucket / kana grid ---------- */
  .grid-buttons{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(84px,1fr));
    gap:10px;
  }
  .bucket-btn{
    position:relative;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 8px 10px;
    cursor:pointer;
    text-align:center;
    color:var(--ink);
    transition:transform .12s, border-color .12s, background .12s;
  }
  .bucket-btn:hover{border-color:var(--teal);transform:translateY(-2px);}
  .bucket-btn:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
  .bucket-btn .main{
    font-family:var(--serif);
    font-weight:700;
    font-size:20px;
    display:block;
  }
  .bucket-btn.kana .main{font-family:var(--sans);font-size:22px;}
  .bucket-btn .count{
    font-family:var(--mono);
    font-size:10px;
    color:var(--muted);
    display:block;
    margin-top:4px;
  }
  .bucket-btn::after{
    content:"";
    position:absolute;top:6px;right:8px;
    width:5px;height:5px;border-radius:50%;
    background:var(--amber);
    opacity:.85;
  }

  /* ---------- Results list ---------- */
  .results-wrap{
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:var(--bg-2);
    overflow:hidden;
  }
  .results-head{
    padding:10px 16px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
  }
  .results-scroll{
    max-height:64vh;
    overflow-y:auto;
    padding:14px;
    display:grid;
    gap:12px;
  }
  .results-scroll::-webkit-scrollbar{width:8px;}
  .results-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}

  .card{
    display:grid;
    grid-template-columns:96px 1fr;
    gap:14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px;
  }
  .kanji-cell{
    position:relative;
    background:
      linear-gradient(var(--paper-line) 1px, transparent 1px) 0 0/100% 33.4%,
      linear-gradient(90deg, var(--paper-line) 1px, transparent 1px) 0 0/33.4% 100%,
      var(--paper);
    background-repeat:no-repeat;
    border-radius:6px;
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .kanji-cell .kj{
    font-family:var(--serif);
    font-weight:700;
    font-size:clamp(22px,4.4vw,30px);
    color:var(--paper-ink);
    line-height:1;
  }
  .stroke-badge{
    position:absolute;
    top:-8px;right:-8px;
    background:var(--bg);
    border:1px solid var(--amber);
    color:var(--amber);
    font-family:var(--mono);
    font-size:10px;
    font-weight:700;
    padding:2px 5px;
    border-radius:6px;
    box-shadow:0 0 0 3px var(--bg-2);
  }
  .card-body{min-width:0;}
  .yomi{
    font-family:var(--mono);
    font-size:12px;
    color:var(--teal);
    letter-spacing:.04em;
  }
  .ja-text{
    font-size:13.5px;
    line-height:1.75;
    margin:6px 0 6px;
    color:var(--ink);
  }
  .en-text{
    font-size:12.5px;
    line-height:1.6;
    color:var(--muted);
    border-top:1px dashed var(--line);
    padding-top:6px;
  }
  .empty-note{
    padding:26px 14px;
    text-align:center;
    color:var(--muted);
    font-family:var(--mono);
    font-size:13px;
  }

  footer{
    max-width:980px;margin:0 auto;padding:10px 20px 40px;
    color:var(--muted);font-family:var(--mono);font-size:11px;
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
  }

  @media (max-width:520px){
    .card{grid-template-columns:76px 1fr;}
    .tabs{grid-template-columns:1fr;}
  }
</style>
</head>

<header>
  <div class="eyebrow">DX学科 &nbsp;/&nbsp; IT Passport Kanji Reference</div>
  <h1>IT<span class="kanji-accent">パスポート</span>漢字用語辞典</h1>

      <span id="results-count"></span>
    </div>
    <div class="results-scroll" id="results-scroll"></div>
  </div>

</div>

<footer>
  <span>ITパスポート 漢字用語辞典 — DX学科教材</span>

</footer>

った発明(はつめい)。", "en": "Employee invention."}, {"kanji": "集積回路", "yomi": "しゅうせきかいろ", "strokes": 47, "ja": "小(ちい)さい板(いた)にたくさんの部品(ぶひん)をまとめた電子部品(でんしぶひん)。ICとも言(い)う。", "en": "Integrated circuit (IC)."}, {"kanji": "責任追跡性", "yomi": "せきにんついせきせい", "strokes": 47, "ja": "誰(だれ)がその操作(そうさ)をしたか後(あと)で確認(かくにん)できる性質(せいしつ)。", "en": "Accountability."}, {"kanji": "経営戦略", "yomi": "けいえいせんりゃく", "strokes": 47, "ja": "会社(かいしゃ)が目標(もくひょう)を達成(たっせい)するための長(なが)い計画(けいかく)。", "en": "Business strategy."}, {"kanji": "品質管理", "yomi": "ひんしつかんり", "strokes": 49, "ja": "製品(せいひん)の質(しつ)が良(よ)いか確認(かくにん)し続(つづ)けること。", "en": "Quality control."}, {"kanji": "経営資源", "yomi": "けいえいしげん", "strokes": 49, "ja": "会社(かいしゃ)を動(うご)かす人(ひと)・物(もの)・お金(かね)・情報(じょうほう)。", "en": "Management resources."}, {"kanji": "競争優位", "yomi": "きょうそうゆうい", "strokes": 50, "ja": "他社(たしゃ)より有利(ゆうり)な立場(たちば)にあること。", "en": "Competitive advantage."}, {"kanji": "妥当性確認", "yomi": "だとうせいかくにん", "strokes": 50, "ja": "作(つく)ったシステムが本当(ほんとう)に必要(ひつよう)なものか確(たし)かめること。", "en": "Validation."}, {"kanji": "中央処理装置", "yomi": "ちゅうおうしょりそうち", "strokes": 50, "ja": "コンピューターの中心(ちゅうしん)で計算(けいさん)をする部分(ぶぶん)。CPUのこと。", "en": "Central Processing Unit (CPU)."}, {"kanji": "記憶装置", "yomi": "きおくそうち", "strokes": 51, "ja": "データやプログラムを覚(おぼ)えておく機械(きかい)。", "en": "Storage device."}, {"kanji": "多要素認証", "yomi": "たようそにんしょう", "strokes": 51, "ja": "パスワードと指紋(しもん)など二(ふた)つ以上(いじょう)の方法(ほうほう)で本人(ほんにん)を確認(かくにん)すること。", "en": "Multi-factor authentication."}, {"kanji": "知的財産権", "yomi": "ちてきざいさんけん", "strokes": 52, "ja": "発明(はつめい)やデザインなど人(ひと)の考(かんが)えを守(まも)る権利(けんり)。", "en": "Intellectual property right."}, {"kanji": "労働基準法", "yomi": "ろうどうきじゅんほう", "strokes": 52, "ja": "労働時間(ろうどうじかん)や休(やす)みなど働(はたら)く人(ひと)を守(まも)る法律(ほうりつ)。", "en": "Labor Standards Act."}, {"kanji": "演算装置", "yomi": "えんざんそうち", "strokes": 53, "ja": "コンピューターの中(なか)で計算(けいさん)を行(おこな)う部分(ぶぶん)。", "en": "Arithmetic unit."}, {"kanji": "標的型攻撃", "yomi": "ひょうてきがたこうげき", "strokes": 54, "ja": "特定(とくてい)の会社(かいしゃ)や人(ひと)を狙(ねら)って行(おこな)う攻撃(こうげき)。", "en": "Targeted attack."}, {"kanji": "不正競争防止法", "yomi": "ふせいきょうそうぼうしほう", "strokes": 54, "ja": "会社同士(かいしゃどうし)のずるい競争(きょうそう)を防(ふせ)ぐ法律(ほうりつ)。", "en": "Unfair Competition Prevention Act."}, {"kanji": "論理演算", "yomi": "ろんりえんざん", "strokes": 54, "ja": "「正(ただ)しい」「正(ただ)しくない」で答(こた)えを出(だ)す計算(けいさん)。", "en": "Logical operation."}, {"kanji": "主記憶装置", "yomi": "しゅきおくそうち", "strokes": 56, "ja": "今(いま)使(つか)っているデータを覚(おぼ)えておく中心(ちゅうしん)の記憶装置(きおくそうち)。", "en": "Main memory."}, {"kanji": "製造物責任法", "yomi": "せいぞうぶつせきにんほう", "strokes": 57, "ja": "欠陥(けっかん)のある製品(せいひん)による被害(ひがい)の責任(せきにん)を定(さだ)めた法律(ほうりつ)。PL法(ほう)。", "en": "Product Liability Act."}, {"kanji": "産業財産権", "yomi": "さんぎょうざいさんけん", "strokes": 60, "ja": "特許権(とっきょけん)や商標権(しょうひょうけん)など産業(さんぎょう)に関(かん)する権利(けんり)。", "en": "Industrial property rights."}, {"kanji": "事業継続計画", "yomi": "じぎょうけいぞくけいかく", "strokes": 64, "ja": "災害(さいがい)などがあっても仕事(しごと)を止(と)めないための計画(けいかく)。BCP。", "en": "Business Continuity Plan (BCP)."}, {"kanji": "補助記憶装置", "yomi": "ほじょきおくそうち", "strokes": 70, "ja": "ハードディスクなどデータを長(なが)い間(あいだ)保存(ほぞん)する装置(そうち)。", "en": "Auxiliary/secondary storage."}, {"kanji": "個人情報保護法", "yomi": "こじんじょうほうほごほう", "strokes": 72, "ja": "個人情報(こじんじょうほう)を正(ただ)しく安全(あんぜん)に扱(あつか)うことを定(さだ)めた法律(ほうりつ)。", "en": "Act on the Protection of Personal Information."}];

const GOJUON = "あいうえおかきくけこがぎぐげごさしすせそざじずぜぞたちつてとだぢづでどなにぬねのはひふへほばびぶべぼぱぴぷぺぽまみむめもやゆよらりるれろわをん".split('');
const SMALL_YOUON = {"ゃ":1,"ゅ":2,"ょ":3};

function toMorae(yomi){
  const chars = Array.from(yomi);
  const morae = [];
  for(let i=0;i<chars.length;i++){
    const c = chars[i];
    if(SMALL_YOUON.hasOwnProperty(c) && morae.length>0){
      morae[morae.length-1] += c;
    } else {
      morae.push(c);
    }
  }
  return morae;
}

function moraSortKey(m){
  const base = m[0];
  const idx = GOJUON.indexOf(base);
  const small = m.length>1 ? (SMALL_YOUON[m[1]]||0) : 0;
  return (idx<0?999:idx)*10 + small;
}

// Precompute morae for each record
DATA.forEach(d=>{ d._morae = toMorae(d.yomi); });

let state = {
  mode:'strokes',      // 'strokes' | 'yomi'
  strokeBucket:null,   // e.g. 20
  kanaStep1:null,
  kanaStep2:null
};

function setMode(mode){
  state = {mode, strokeBucket:null, kanaStep1:null, kanaStep2:null};
  document.getElementById('tab-strokes').classList.toggle('active', mode==='strokes');
  document.getElementById('tab-yomi').classList.toggle('active', mode==='yomi');
  render();
}

function goBack(){
  if(state.mode==='strokes'){
    state.strokeBucket = null;
  } else {
    if(state.kanaStep2!==null){ state.kanaStep2 = null; }
    else if(state.kanaStep1!==null){ state.kanaStep1 = null; }
  }
  render();
}

function jumpTo(level){
  if(state.mode==='strokes'){ state.strokeBucket = null; }
  else {
    if(level==='root'){ state.kanaStep1=null; state.kanaStep2=null; }
    else if(level==='step1'){ state.kanaStep2=null; }
  }
  render();
}

function bucketOf(strokes){ return Math.floor(strokes/10)*10; }
function bucketLabel(b){ return b===0 ? '1〜9画' : (b+'画代'); }

function render(){
  const picker = document.getElementById('picker');
  const resultsPanel = document.getElementById('results-panel');
  const crumbs = document.getElementById('crumbs');
  const backbtn = document.getElementById('backbtn');
  picker.innerHTML='';
  resultsPanel.style.display='none';
  crumbs.innerHTML='';
  backbtn.style.display='none';

  if(state.mode==='strokes'){
    crumbs.innerHTML = `<span class="seg" onclick="jumpTo('root')">画数で探す</span>` +
      (state.strokeBucket!==null ? `<span class="sep">/</span><span>${bucketLabel(state.strokeBucket)}</span>` : '');

    if(state.strokeBucket===null){
      const buckets = {};
      DATA.forEach(d=>{ const b=bucketOf(d.strokes); buckets[b]=(buckets[b]||0)+1; });
      Object.keys(buckets).map(Number).sort((a,b)=>a-b).forEach(b=>{
        const btn = document.createElement('button');
        btn.className='bucket-btn';
        btn.innerHTML = `<span class="main">${bucketLabel(b)}</span><span class="count">${buckets[b]}語</span>`;
        btn.onclick = ()=>{ state.strokeBucket=b; render(); };
        picker.appendChild(btn);
      });
    } else {
      backbtn.style.display='inline-block';
      const list = DATA.filter(d=>bucketOf(d.strokes)===state.strokeBucket)
                        .sort((a,b)=> a.strokes-b.strokes || a.kanji.localeCompare(b.kanji,'ja'));
      showResults(list, bucketLabel(state.strokeBucket));
    }
    return;
  }

  // yomi mode
  let crumbHtml = `<span class="seg" onclick="jumpTo('root')">よみで探す</span>`;
  if(state.kanaStep1!==null) crumbHtml += `<span class="sep">/</span><span class="seg" onclick="jumpTo('step1')">${state.kanaStep1}</span>`;
  if(state.kanaStep2!==null) crumbHtml += `<span class="sep">/</span><span>${state.kanaStep2}</span>`;
  crumbs.innerHTML = crumbHtml;

  if(state.kanaStep1===null){
    const groups = {};
    DATA.forEach(d=>{ const k=d._morae[0]; groups[k]=(groups[k]||0)+1; });
    Object.keys(groups).sort((a,b)=>moraSortKey(a)-moraSortKey(b)).forEach(k=>{
      const btn = document.createElement('button');
      btn.className='bucket-btn kana';
      btn.innerHTML = `<span class="main">${k}</span><span class="count">${groups[k]}語</span>`;
      btn.onclick = ()=>{ state.kanaStep1=k; render(); };
      picker.appendChild(btn);
    });
  } else if(state.kanaStep2===null){
    backbtn.style.display='inline-block';
    const subset = DATA.filter(d=>d._morae[0]===state.kanaStep1);
    const groups = {};
    subset.forEach(d=>{
      const k2 = d._morae.length>1 ? d._morae[1] : '(なし)';
      groups[k2]=(groups[k2]||0)+1;
    });
    Object.keys(groups).sort((a,b)=>moraSortKey(a)-moraSortKey(b)).forEach(k=>{
      const btn = document.createElement('button');
      btn.className='bucket-btn kana';
      btn.innerHTML = `<span class="main">${state.kanaStep1}${k==='(なし)'?'':k}</span><span class="count">${groups[k]}語</span>`;
      btn.onclick = ()=>{ state.kanaStep2=k; render(); };
      picker.appendChild(btn);
    });
  } else {
    backbtn.style.display='inline-block';
    const list = DATA.filter(d=>{
      const m1 = d._morae[0];
      const m2 = d._morae.length>1 ? d._morae[1] : '(なし)';
      return m1===state.kanaStep1 && m2===state.kanaStep2;
    }).sort((a,b)=> a.yomi.localeCompare(b.yomi,'ja'));
    showResults(list, state.kanaStep1 + (state.kanaStep2==='(なし)'?'':state.kanaStep2));
  }
}

function showResults(list, label){
  const resultsPanel = document.getElementById('results-panel');
  const scroll = document.getElementById('results-scroll');
  document.getElementById('results-label').textContent = `「${label}」の検索結果`;
  document.getElementById('results-count').textContent = `${list.length} 語`;
  scroll.innerHTML='';
  if(list.length===0){
    scroll.innerHTML = `<div class="empty-note">該当する用語がありません</div>`;
  } else {
    list.forEach(d=>{
      const card = document.createElement('div');
      card.className='card';
      card.innerHTML = `
        <div class="kanji-cell">
          <span class="kj">${d.kanji}</span>
          <span class="stroke-badge">${d.strokes}画</span>
        </div>
        <div class="card-body">
          <div class="yomi">${d.yomi}</div>
          <div class="ja-text">${d.ja}</div>
          <div class="en-text">${d.en}</div>
        </div>`;
      scroll.appendChild(card);
    });
  }
  resultsPanel.style.display='block';
}

document.getElementById('stat-total').textContent = DATA.length;
document.getElementById('stat-strokes').textContent = Math.min(...DATA.map(d=>d.strokes));
document.getElementById('stat-strokes-max').textContent = Math.max(...DATA.map(d=>d.strokes));

render();
</script>
</body>
</html>
